<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>OpenInsight Portal</title>
    <style>
      body { font-family: sans-serif; margin: 3rem; background: #f5f7fa; color: #0f172a; }
      main { max-width: 42rem; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); }
      h1 { margin-top: 0; }
      ul { list-style: none; padding: 0; display: grid; gap: 1rem; }
      li { padding: 1rem; border: 1px solid #dbe3ee; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
      button { background: #0f62fe; color: #fff; border: 0; border-radius: 8px; padding: 0.75rem 1rem; cursor: pointer; }
      a { color: #0f62fe; text-decoration: none; }
      .meta { color: #475569; margin-bottom: 1.5rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>OpenInsight Portal</h1>
      <p class="meta">Signed in as <strong>{{ user.name }}</strong>. Choose the target database you want to open in Superset.</p>
      <ul>
        {% for target in targets %}
        <li>
          <div>
            <strong>{{ target.label }}</strong><br>
            <small>{{ target.id }}</small>
          </div>
          <form method="post" action="/launch/{{ target.id }}">
            <button type="submit">Open In Superset</button>
          </form>
        </li>
        {% endfor %}
      </ul>
      <p><a href="/logout">Sign out of the portal</a></p>
    </main>
  </body>
  </html>
