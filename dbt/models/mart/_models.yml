version: 2

models:
  - name: dim_customers
    description: "Customer dimension table — pulled from PostgreSQL via ClickHouse postgresql() engine"
    columns:
      - name: id
        description: "Primary key — customer identifier"
        tests:
          - not_null
          - unique
      - name: name
        tests:
          - not_null
      - name: tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["standard", "premium", "enterprise"]
