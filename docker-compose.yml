# =============================================================================
# OpenInsight Local Development Environment
# =============================================================================
# Core stack (always running):  docker compose up -d
# App stack (future):           docker compose --profile app up -d
# Pipeline stack:               docker compose --profile pipeline up -d
# Full stack:                   docker compose --profile app --profile pipeline up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — OLTP storage, metadata, Keycloak/Superset/Airflow databases
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: openinsight-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openinsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openinsight_dev}
      POSTGRES_DB: ${POSTGRES_DB:-openinsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openinsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ClickHouse — OLAP columnar storage for analytics
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: openinsight-clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-openinsight}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-openinsight_dev}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-openinsight}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak — Identity & Access Management (SSO, OIDC, RBAC)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: openinsight-keycloak
    command: start-dev --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-openinsight}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-openinsight_dev}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - ./keycloak/realm-openinsight.json:/opt/keycloak/data/import/realm-openinsight.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — Cache, pub/sub for Cube cache invalidation
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: openinsight-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible message broker (no ZooKeeper)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: openinsight-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda Console — Web UI for topic inspection and debugging
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    container_name: openinsight-redpanda-console
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8888}:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
      # Keycloak OIDC login (Redpanda Console OSS v2.4 login feature)
      # See: https://docs.redpanda.com/current/console/config/
      LOGIN_ENABLED: "true"
      LOGIN_JWTSECRET: ${REDPANDA_CONSOLE_JWT_SECRET:-redpanda-console-jwt-dev-secret}
      LOGIN_OIDC_ENABLED: "true"
      LOGIN_OIDC_CLIENTID: redpanda-console
      LOGIN_OIDC_CLIENTSECRET: ${REDPANDA_CONSOLE_OIDC_SECRET:-redpanda-console-dev-secret}
      LOGIN_OIDC_ISSUERURL: http://keycloak:8080/realms/openinsight
      LOGIN_OIDC_REDIRECTURL: http://localhost:${REDPANDA_CONSOLE_PORT:-8888}/auth/callbacks/oidc
      LOGIN_OIDC_USERIDENTIFYINGCLAIMKEY: preferred_username
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Apache Hop Web — Visual ETL/Pipeline Designer (Pipeline profile)
  # ---------------------------------------------------------------------------
  hop-web:
    image: apache/hop-web:2.10.0
    container_name: openinsight-hop-web
    profiles: ["pipeline"]
    ports:
      - "${HOP_WEB_PORT:-8090}:8080"
    environment:
      HOP_PROJECT_NAME: openinsight
      HOP_PROJECT_FOLDER: /project
      HOP_ENVIRONMENT_NAME: local-dev
      HOP_ENVIRONMENT_CONFIG_FILE_NAME_PATHS: /project/local-dev.json
      HOP_LOG_LEVEL: Basic
    volumes:
      - ./hop/projects/openinsight:/project
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ui || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow — Workflow orchestration (Pipeline profile)
  # LocalExecutor; scheduler + webserver co-located via airflow-entrypoint.sh
  # Metadata DB: PostgreSQL `airflow` database (created by init-postgres.sh)
  # ---------------------------------------------------------------------------
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: openinsight-airflow:latest
    container_name: openinsight-airflow
    profiles: ["pipeline"]
    ports:
      - "${AIRFLOW_PORT:-8081}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-openinsight}:${POSTGRES_PASSWORD:-openinsight_dev}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-openinsight-airflow-dev-secret}
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      # Keycloak OIDC (same dual-URL pattern as Superset)
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_EXTERNAL_URL: http://localhost:${KEYCLOAK_PORT:-8080}
      KEYCLOAK_REALM: openinsight
      AIRFLOW_KEYCLOAK_CLIENT_ID: airflow
      AIRFLOW_KEYCLOAK_SECRET: ${AIRFLOW_KEYCLOAK_SECRET:-airflow-dev-secret}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/webserver_config.py:/opt/airflow/webserver_config.py:ro
      - ./scripts/airflow-entrypoint.sh:/opt/airflow/entrypoint.sh:ro
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["bash", "/opt/airflow/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health | grep -q '\"status\": \"healthy\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Trino — Query federation across ClickHouse + PostgreSQL (App profile)
  # ---------------------------------------------------------------------------
  trino:
    image: trinodb/trino:435
    container_name: openinsight-trino
    profiles: ["app"]
    ports:
      - "${TRINO_PORT:-8085}:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Superset — Visualization (App profile, Keycloak OIDC)
  # Custom build adds clickhouse-connect + Authlib on top of official image
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: openinsight-superset:latest
    container_name: openinsight-superset
    profiles: ["app"]
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-changeme-generate-a-real-secret}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://openinsight:openinsight_dev@postgres:5432/superset
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_EXTERNAL_URL: http://localhost:${KEYCLOAK_PORT:-8080}
      KEYCLOAK_REALM: openinsight
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  redis_data:
    driver: local
  redpanda_data:
    driver: local
  airflow_logs:
    driver: local

networks:
  default:
    name: openinsight
    driver: bridge
