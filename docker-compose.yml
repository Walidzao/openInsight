# =============================================================================
# OpenInsight Local Development Environment
# =============================================================================
# Core stack (always running):  docker compose up -d
# App stack (future):           docker compose --profile app up -d
# Pipeline stack (future):      docker compose --profile pipeline up -d
# Full stack:                   docker compose --profile app --profile pipeline up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — OLTP storage, metadata, Keycloak/Superset/Airflow databases
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: openinsight-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openinsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openinsight_dev}
      POSTGRES_DB: ${POSTGRES_DB:-openinsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openinsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ClickHouse — OLAP columnar storage for analytics
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: openinsight-clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-openinsight}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-openinsight_dev}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-openinsight}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak — Identity & Access Management (SSO, OIDC, RBAC)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: openinsight-keycloak
    command: start-dev --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-openinsight}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-openinsight_dev}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - ./keycloak/realm-openinsight.json:/opt/keycloak/data/import/realm-openinsight.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — Cache, pub/sub for Cube cache invalidation
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: openinsight-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible message broker (no ZooKeeper)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: openinsight-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda Console — Web UI for topic inspection and debugging
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    container_name: openinsight-redpanda-console
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8888}:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  redis_data:
    driver: local
  redpanda_data:
    driver: local

networks:
  default:
    name: openinsight
    driver: bridge
